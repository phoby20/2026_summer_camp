<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>OVERFLOW — Summer Camp 2026</title>
    <meta
      name="description"
      content="Summer Camp 2026 OVERFLOW｜2026.7.30(木)〜8.1(土) 相模湖祈祷院 恵みシャレー"
    />
    <meta property="og:title" content="OVERFLOW — Summer Camp 2026" />
    <meta
      property="og:description"
      content="いのちの川にひたる3日間｜2026.7.30〜8.1 相模湖祈祷院 恵みシャレー"
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Zen+Kaku+Gothic+New:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #02141f;
      }
      body {
        font-family: "Zen Kaku Gothic New", sans-serif;
        color: #eafcff;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      .stage {
        position: relative;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background:
          radial-gradient(
            70% 42% at 50% 6%,
            #0b4a63 0%,
            rgba(11, 74, 99, 0) 60%
          ),
          radial-gradient(
            55% 55% at 50% 46%,
            #0a3f5c 0%,
            rgba(10, 63, 92, 0) 70%
          ),
          linear-gradient(180deg, #02141f 0%, #04253a 48%, #021825 100%);
      }

      /* central pouring light shaft */
      .fx {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 1;
        pointer-events: none;
      }
      .shaft {
        position: absolute;
        top: -5vh;
        left: 50%;
        transform: translateX(-50%);
        width: clamp(220px, 30vw, 460px);
        height: 130vh;
        background: linear-gradient(
          180deg,
          rgba(120, 240, 235, 0) 0%,
          rgba(110, 235, 225, 0.28) 13%,
          rgba(90, 220, 225, 0.16) 60%,
          rgba(90, 220, 225, 0) 100%
        );
        filter: blur(8px);
        mix-blend-mode: screen;
      }
      .shaft2 {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: clamp(110px, 15vw, 230px);
        height: 120vh;
        background: linear-gradient(
          180deg,
          rgba(190, 255, 250, 0),
          rgba(190, 255, 250, 0.34) 17%,
          rgba(150, 245, 240, 0.1) 70%,
          transparent
        );
        filter: blur(5px);
        mix-blend-mode: screen;
        animation: shimmer 5s ease-in-out infinite;
        will-change: transform, opacity;
      }
      @keyframes shimmer {
        0%,
        100% {
          opacity: 0.7;
          transform: translateX(-50%) scaleX(1);
        }
        50% {
          opacity: 1;
          transform: translateX(-50%) scaleX(1.25);
        }
      }
      .gl {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #dffffb,
          rgba(120, 240, 235, 0) 70%
        );
        filter: blur(0.5px);
        animation: fall linear infinite;
        will-change: transform, opacity;
      }
      @keyframes fall {
        0% {
          transform: translateY(-60px);
          opacity: 0;
        }
        15% {
          opacity: 0.9;
        }
        100% {
          transform: translateY(128vh);
          opacity: 0;
        }
      }

      .content {
        position: relative;
        z-index: 3;
        max-width: 860px;
        margin: 0 auto;
        min-height: 116vh;
        min-height: 116dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: clamp(32px, 5vh, 72px) clamp(22px, 5vw, 60px);
        padding-left: max(
          clamp(22px, 5vw, 60px),
          env(safe-area-inset-left, 0px)
        );
        padding-right: max(
          clamp(22px, 5vw, 60px),
          env(safe-area-inset-right, 0px)
        );
      }

      .kick {
        font-weight: 500;
        letter-spacing: 0.5em;
        padding-left: 0.5em;
        font-size: clamp(10px, 0.9vw, 11px);
        color: #6fe7df;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(80, 230, 220, 0.6);
      }
      .kick2 {
        margin-top: clamp(8px, 1.2vw, 12px);
        font-weight: 300;
        font-size: clamp(13px, 1.3vw, 16px);
        color: #bfeef0;
        letter-spacing: 0.04em;
      }

      .title {
        margin-top: clamp(18px, 2.4vw, 36px);
        font-family: "Anton";
        font-size: clamp(56px, 14vw, 116px);
        line-height: 0.97;
        letter-spacing: 0.02em;
        color: #f4ffff;
        text-shadow:
          0 0 40px rgba(90, 225, 220, 0.55),
          0 8px 30px rgba(0, 0, 0, 0.5);
      }
      .title .b {
        display: block;
        padding-bottom: 0.12em;
        background: linear-gradient(180deg, #eafffd, #5fe3da);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      @media (min-width: 820px) {
        .title {
          font-size: clamp(88px, 9vw, 120px);
        }
        .title .b {
          display: inline;
          padding-bottom: 0.04em;
        }
      }

      .verse {
        margin-top: clamp(20px, 2.8vw, 36px);
        max-width: min(92vw, 620px);
        font-weight: 300;
        font-size: clamp(12px, 1.2vw, 14px);
        line-height: 1.95;
        color: #ffe23d;
      }
      .verse .em {
        color: #fff27a;
        font-weight: 500;
      }
      .mob-br {
        display: none;
      }
      @media (max-width: 639px) {
        .mob-br {
          display: block;
        }
      }
      .ref {
        margin-top: clamp(8px, 1vw, 12px);
        font-weight: 500;
        font-size: clamp(11px, 1vw, 13px);
        color: #ffd83a;
        letter-spacing: 0.08em;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.4em;
        margin-top: clamp(36px, 5vw, 60px);
        font-weight: 700;
        font-size: clamp(11px, 0.9vw, 12px);
        letter-spacing: 0.06em;
        color: #02141f;
        text-decoration: none;
        background: linear-gradient(180deg, #7af0e4, #34cabd);
        padding: clamp(7px, 0.7vw, 8px) clamp(14px, 1.8vw, 18px);
        border-radius: 60px;
        box-shadow:
          0 4px 14px rgba(50, 210, 200, 0.32),
          inset 0 0 0 1px rgba(150, 255, 247, 0.45);
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .cta:hover {
        transform: translateY(-2px);
        box-shadow:
          0 10px 28px rgba(50, 210, 200, 0.55),
          inset 0 0 0 1px rgba(150, 255, 247, 0.65);
      }
      .cta:active {
        transform: translateY(-1px);
      }
      .cta .arr {
        transition: transform 0.16s ease;
      }
      .cta:hover .arr {
        transform: translateX(4px);
      }

      .lect {
        margin-top: clamp(10px, 1.4vw, 16px);
        font-weight: 500;
        font-size: clamp(12px, 1.1vw, 14px);
        letter-spacing: 0.06em;
        color: #cfeef0;
      }
      .foot {
        margin-top: auto;
        padding-top: clamp(20px, 3vw, 36px);
        display: flex;
        flex-direction: column;
        gap: clamp(8px, 1vw, 12px);
        align-items: center;
      }
      .dates {
        font-family: "Anton";
        font-size: clamp(13px, 1.3vw, 16px);
        letter-spacing: 0.1em;
        color: #eafcff;
      }
      .hair {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #5fe3da, transparent);
      }
      .venue {
        font-weight: 500;
        font-size: clamp(11px, 1.1vw, 14px);
        letter-spacing: 0.16em;
        padding-left: 0.16em;
        color: #9fe6e2;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="fx">
        <div class="shaft"></div>
        <div class="shaft2"></div>
        <div class="glints" id="glints"></div>
      </div>
      <div class="content">
        <div class="kick">Summer Camp 2026</div>
        <div class="kick2">いのちの川にひたる3日間</div>
        <h1 class="title">OVER<span class="b">FLOW</span></h1>
        <p class="verse">
          その腹から<span class="em">生ける水が川となって</span
          ><br class="mob-br" />流れ出るであろう。
        </p>
        <div class="ref">ヨハネ 7:38</div>
        <div class="lect">講師：小川遼 牧師</div>

        <a
          class="cta"
          href="https://docs.google.com/forms/d/e/1FAIpQLSeNexRIThyeexuitxiXCx4ohIcAw9is7K4lJ6KI48upclCsRQ/viewform"
          target="_blank"
          rel="noopener noreferrer"
        >
          参加申し込み
        </a>

        <div class="foot">
          <div class="dates">7.30 THU — 8.1 SAT</div>
          <div class="hair"></div>
          <div class="venue">相模湖祈祷院　恵みシャレー</div>
        </div>
      </div>
    </div>

    <script>
      const g = document.getElementById("glints");
      const N = window.innerWidth < 640 ? 12 : 30;
      for (let i = 0; i < N; i++) {
        const d = document.createElement("div");
        d.className = "gl";
        const s = 2 + Math.random() * 5;
        d.style.width = s + "px";
        d.style.height = s * 2.4 + "px";
        d.style.left = 50 + (Math.random() * 24 - 12) + "%";
        d.style.animationDuration = (2.2 + Math.random() * 2.5) / 0.3 + "s";
        d.style.animationDelay = -Math.random() * 8 + "s";
        g.appendChild(d);
      }
    </script>
  </body>
</html>
